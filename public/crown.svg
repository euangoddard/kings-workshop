  <path d="M16 7 L13 14 L16 12 L19 14 Z" fill="#fbbf24"/>
  <!-- Central gem -->
  <circle cx="16" cy="20" r="2" fill="#fef3c7"/>
  <circle cx="16" cy="20" r="1.2" fill="#fcd34d"/>
  <!-- Side gems -->
