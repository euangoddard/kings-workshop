  <rect width="32" height="32" rx="5" fill="#0f172a"/>
  <!-- Forge glow behind crown -->
  <radialGradient id="glow" cx="50%" cy="70%" r="50%">
    <stop offset="0%" stop-color="#f97316" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
  </radialGradient>
  <rect width="32" height="32" rx="5" fill="url(#glow)"/>
  <!-- Crown body -->
  <path d="M4 22 L4 10 L10 16 L16 7 L22 16 L28 10 L28 22 Z" fill="#d97706"/>
  <!-- Crown base band -->
  <rect x="4" y="22" width="24" height="4" rx="1" fill="#b45309"/>
